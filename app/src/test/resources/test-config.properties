# Comprehensive Test Configuration for Hub-and-Spoke Architecture
# This file contains configuration for all test types: Unit, Integration, Performance

# Test Environment Configuration
test.environment=development
test.timeout.default=30000
test.timeout.integration=60000
test.timeout.performance=120000

# Network Configuration for Integration Tests
test.network.hub.host=localhost
test.network.hub.port=8080
test.network.timeout.connection=10000
test.network.timeout.sync=5000

# Mock Device Configuration
test.device.android.001.id=ANDROID_TEST_001
test.device.android.001.capabilities=rgb,thermal,gsr
test.device.android.002.id=ANDROID_TEST_002  
test.device.android.002.capabilities=rgb,gsr
test.device.android.003.id=ANDROID_TEST_003
test.device.android.003.capabilities=thermal,gsr

# Performance Test Thresholds
test.performance.sync.accuracy.max.ms=5.0
test.performance.network.latency.max.ms=50.0
test.performance.throughput.min.ops.per.sec=50.0
test.performance.memory.growth.max.mb=50.0
test.performance.error.rate.max.percent=1.0

# GSR Sensor Test Configuration (12-bit ADC compliance)
test.gsr.adc.min=0
test.gsr.adc.max=4095
test.gsr.microsiemens.min=0.0
test.gsr.microsiemens.max=100.0
test.gsr.sampling.rate.hz=10.0

# Thermal Camera Test Configuration  
test.thermal.temperature.min.celsius=-40.0
test.thermal.temperature.max.celsius=150.0
test.thermal.matrix.width=160
test.thermal.matrix.height=120
test.thermal.sampling.rate.hz=10.0

# RGB Camera Test Configuration
test.rgb.resolution.width=1920
test.rgb.resolution.height=1080
test.rgb.fps=30
test.rgb.format=mp4

# Time Synchronization Test Configuration
test.time.sync.tolerance.ms=5.0
test.time.sync.max.offset.ms=1000.0
test.time.sync.retry.count=3

# Data Quality Test Thresholds
test.data.quality.completeness.min=0.99
test.data.quality.validity.min=0.95
test.data.quality.consistency.min=0.98

# File Transfer Test Configuration
test.file.transfer.chunk.size.kb=64
test.file.transfer.max.size.mb=100
test.file.transfer.timeout.ms=30000

# Vendor SDK Test Configuration
test.vendor.shimmer.enabled=true
test.vendor.shimmer.mock.device.id=SHIMMER_TEST_001
test.vendor.thermal.enabled=true
test.vendor.thermal.mock.device.path=/dev/video0

# Logging Configuration for Tests
test.logging.level=DEBUG
test.logging.output.console=true
test.logging.output.file=true
test.logging.file.path=test_logs/test_execution.log

# Test Data Generation
test.data.generation.seed=12345
test.data.generation.gsr.samples=1000
test.data.generation.thermal.frames=100
test.data.generation.rgb.frames=100

# Concurrency Test Configuration
test.concurrency.max.threads=10
test.concurrency.max.operations=1000
test.concurrency.timeout.ms=60000

# Integration Test Scenarios
test.integration.scenarios=basic_connection,multi_modal_recording,sync_marker_distribution,file_transfer,error_recovery
test.integration.basic_connection.duration.s=30
test.integration.multi_modal_recording.duration.s=60
test.integration.sync_marker_distribution.count=10
test.integration.file_transfer.files=3
test.integration.error_recovery.scenarios=device_disconnect,network_timeout,corrupted_data