# Detekt Configuration for IRCamera
# Static code analysis for Kotlin
# 
# To run: ./gradlew detekt
# To add to project: Add detekt plugin to build.gradle.kts

style:
  # Flag excessive use of non-null assertion operator (!!)
  ForbiddenComment:
    active: false
  
  # Detect multiple consecutive !! operators which are high-risk
  MaxLineLength:
    active: true
    maxLineLength: 120
    excludeCommentStatements: true

potential-bugs:
  # Warn about lateinit usage without proper initialization
  LateinitUsage:
    active: true
    excludeAnnotatedProperties: ["Inject"]
    ignoreOnClassesPattern: ""
  
  # Detect unsafe casts
  UnsafeCast:
    active: true
  
  # Detect unreachable code
  UnreachableCode:
    active: true

complexity:
  # Limit cyclomatic complexity
  ComplexMethod:
    active: true
    threshold: 15
  
  # Limit nesting depth
  NestedBlockDepth:
    active: true
    threshold: 4

# Custom rules for anti-patterns
comments:
  active: true
  # Require documentation for public APIs
  UndocumentedPublicClass:
    active: false
  UndocumentedPublicFunction:
    active: false

naming:
  # Enforce naming conventions
  FunctionNaming:
    active: true
  ClassNaming:
    active: true
  VariableNaming:
    active: true

# Enable all rule sets
build:
  maxIssues: 0
  excludeCorrectable: false
