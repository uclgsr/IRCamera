# Detekt Configuration for IRCamera
# Static code analysis for Kotlin
# 
# To run: ./gradlew detekt
# To add to project: Add detekt plugin to build.gradle.kts

build:
  maxIssues: 0
  excludeCorrectable: false
  weights:
    complexity: 2
    LongParameterList: 1
    style: 1
    comments: 1

style:
  ForbiddenComment:
    active: false
  
  MaxLineLength:
    active: true
    maxLineLength: 120
    excludeCommentStatements: true
    excludeImportStatements: true
  
  MagicNumber:
    active: true
    ignoreNumbers: ['-1', '0', '1', '2', '100', '1000']
    ignoreHashCodeFunction: true
    ignorePropertyDeclaration: true
    ignoreLocalVariableDeclaration: false
    ignoreConstantDeclaration: true
    ignoreCompanionObjectPropertyDeclaration: true
  
  UnusedImports:
    active: true

potential-bugs:
  LateinitUsage:
    active: true
    excludeAnnotatedProperties: ["Inject"]
    ignoreOnClassesPattern: ""
  
  UnsafeCast:
    active: true
  
  UnreachableCode:
    active: true
  
  ExplicitGarbageCollectionCall:
    active: true
  
  HasPlatformType:
    active: true
  
  IgnoredReturnValue:
    active: true

complexity:
  ComplexMethod:
    active: true
    threshold: 15
  
  NestedBlockDepth:
    active: true
    threshold: 4
  
  LongMethod:
    active: true
    threshold: 60
  
  LongParameterList:
    active: true
    functionThreshold: 6
    constructorThreshold: 7
  
  TooManyFunctions:
    active: true
    thresholdInFiles: 20
    thresholdInClasses: 20
    thresholdInInterfaces: 15

comments:
  active: true
  UndocumentedPublicClass:
    active: false
  UndocumentedPublicFunction:
    active: false

naming:
  # Enforce naming conventions
  FunctionNaming:
    active: true
  ClassNaming:
    active: true
  VariableNaming:
    active: true

# Enable all rule sets
build:
  maxIssues: 0
  excludeCorrectable: false
