# Comprehensive Test Configuration for PC Controller (Hub)
# Hub-and-Spoke Architecture Testing Configuration

# Test Environment
environment:
  type: "development"
  debug: true
  log_level: "DEBUG"
  
# Network Server Configuration for Testing
network:
  test_host: "localhost"
  test_port: 8080
  backup_ports: [8081, 8082, 8083]
  timeout:
    connection: 10.0  # seconds
    sync: 5.0
    file_transfer: 30.0
  
# Mock Android Devices for Testing
mock_devices:
  - device_id: "ANDROID_TEST_001"
    device_type: "android_spoke"
    capabilities: ["rgb", "thermal", "gsr"]
    location: "192.168.1.101"
    
  - device_id: "ANDROID_TEST_002"
    device_type: "android_spoke" 
    capabilities: ["rgb", "gsr"]
    location: "192.168.1.102"
    
  - device_id: "ANDROID_TEST_003"
    device_type: "android_spoke"
    capabilities: ["thermal", "gsr"]
    location: "192.168.1.103"

# Performance Test Thresholds
performance:
  sync_accuracy:
    target_ms: 2.0
    max_acceptable_ms: 5.0
    
  network:
    min_throughput_mbps: 1.0
    max_latency_ms: 50.0
    
  memory:
    max_growth_mb_per_hour: 10.0
    max_total_usage_mb: 500.0
    
  cpu:
    max_average_percent: 80.0
    max_peak_percent: 95.0

# Data Aggregation Test Configuration  
data_aggregation:
  test_session_duration: 60  # seconds
  sync_markers_per_minute: 10
  
  test_data_sizes:
    small_kb: 10
    medium_mb: 1
    large_mb: 10
    
  export_formats:
    - "csv"
    - "excel" 
    - "hdf5"
    - "json"

# Integration Test Scenarios
integration_tests:
  multi_device_registration:
    device_count: 3
    registration_timeout: 10.0
    
  coordinated_recording:
    session_duration: 30.0  # seconds (accelerated for testing)
    sync_events: 5
    expected_files_per_device: 3
    
  file_transfer:
    chunk_size_kb: 64
    test_file_sizes: [1, 10, 100]  # KB
    concurrent_transfers: 3
    
  error_recovery:
    scenarios:
      - "device_disconnect"
      - "network_congestion" 
      - "corrupted_message"
      - "sync_timeout"

# Quality Assurance Thresholds
quality_assurance:
  data_completeness_min: 0.99
  sync_accuracy_success_rate: 0.95
  file_transfer_success_rate: 0.98
  network_uptime_min: 0.999

# Test Data Generation
test_data:
  gsr:
    baseline_microsiemens: 25.0
    variation_range: 10.0
    sampling_rate_hz: 10.0
    noise_level: 0.5
    
  thermal:
    baseline_celsius: 25.0
    variation_range: 5.0
    matrix_size: [160, 120]
    sampling_rate_hz: 10.0
    
  rgb:
    resolution: [1920, 1080]
    fps: 30
    metadata_fields: ["timestamp", "frame_number", "exposure_ms", "iso"]

# Load Testing Configuration
load_testing:
  ramp_up:
    start_devices: 1
    max_devices: 10
    increment_interval_s: 5
    
  sustained_load:
    device_count: 5
    duration_minutes: 10
    operations_per_second: 20
    
  stress_test:
    device_count: 15
    burst_operations: 100
    burst_interval_s: 10

# Test Reporting
reporting:
  generate_html: true
  generate_json: true
  generate_csv: true
  include_coverage: true
  include_performance_charts: true
  
  output_directory: "test_reports"
  
  coverage:
    target_percentage: 80.0
    fail_under: 70.0
    
# Timeouts (in seconds)
timeouts:
  unit_test: 30
  integration_test: 120
  performance_test: 300
  load_test: 600

# Test Database (SQLite for test data)
test_database:
  path: ":memory:"  # In-memory database for tests
  reset_between_tests: true
  
# Logging for Tests
logging:
  level: "DEBUG"
  console: true
  file: true
  file_path: "test_logs/pc_controller_tests.log"
  
  formatters:
    detailed: "%(asctime)s - %(name)s - %(levelname)s - %(filename)s:%(lineno)d - %(message)s"
    simple: "%(levelname)s: %(message)s"

# Security Testing
security:
  test_invalid_certificates: true
  test_unauthorized_access: true  
  test_data_encryption: true
  test_protocol_validation: true

# Vendor Integration Testing
vendor_integration:
  shimmer:
    enabled: true
    mock_mode: true
    test_device_id: "SHIMMER_MOCK_001"
    
  thermal_camera:
    enabled: true 
    mock_mode: true
    test_device_path: "/dev/video_test"
    
# Continuous Integration
ci:
  fail_fast: false
  retry_flaky_tests: 3
  parallel_execution: true
  max_parallel_workers: 4