calibration:
  max_reprojection_error: 0.5
  min_images: 10
  pattern_size:
    - 9
    - 6
  pattern_type: checkerboard
  square_size: 25.0
gsr:
  bridged_latency_p95_ms: 150
  default_mode: local
  reconciliation_window_s: 1800
  sampling_rate: 128
gui:
  auto_save_layout: true
  theme: default
  update_interval_ms: 100
  window_size:
    - 1200
    - 800
logging:
  console_output: true
  file_rotation: 1 MB
  level: INFO
  retention: 30 days
network:
  connection_timeout: 30
  heartbeat_interval: 5
  max_connections: 8
  server_host: 0.0.0.0
  server_port: 8080
security:
  auth_token_required: true
  device_whitelist_enabled: false
  encryption_algorithm: AES256
  require_tls: true
session:
  auto_backup: true
  data_root: pc_data
  max_session_duration: 7200
  metadata_format: json
  allow_only_one_active: true
simulation:
  enable_by_default: true
  force: false
  sensors:
    - sim_gsr
time_sync:
  max_offset_ms: 15
  sync_interval: 30
  target_accuracy_ms: 5
time_sync_service:
  host: 0.0.0.0
  port: 47017
  max_clients: 32
  ttl_seconds: 30
sensors:
  shimmer_gsr_01:
    name: Shimmer3 Unit A
    address:
    stream_uuid: 0000fff4-0000-1000-8000-00805f9b34fb
    sample_rate_hz: 128
  shimmer_gsr_02:
    name: Shimmer3 Unit B
    address:
    stream_uuid: 0000fff4-0000-1000-8000-00805f9b34fb
    sample_rate_hz: 128
transfer:
  chunk_size: 1048576
  compression_enabled: true
  max_retries: 3
  verify_checksums: true
  checksum_algorithm: sha256
  expected_ack: true
