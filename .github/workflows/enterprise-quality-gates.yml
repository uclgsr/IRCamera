name: 🏆 Enterprise Quality Gates

on:
  push:
    branches: [ main, develop, 'copilot/**' ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 6 * * *'  # Daily quality analysis at 6 AM UTC
  workflow_dispatch:
    inputs:
      quality_level:
        description: 'Quality Analysis Level'
        required: true
        default: 'comprehensive'
        type: choice
        options:
        - 'basic'
        - 'comprehensive'
        - 'enterprise'
      auto_fix:
        description: 'Attempt automatic fixes'
        required: false
        default: true
        type: boolean

env:
  QUALITY_THRESHOLD: 85
  SECURITY_THRESHOLD: 90
  COVERAGE_THRESHOLD: 70

jobs:
  quality-analysis:
    name: 🔍 Enterprise Quality Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    outputs:
      quality-score: ${{ steps.analysis.outputs.quality-score }}
      quality-gate: ${{ steps.analysis.outputs.quality-gate }}
      security-score: ${{ steps.analysis.outputs.security-score }}
      coverage-score: ${{ steps.analysis.outputs.coverage-score }}
    
    steps:
    - name: 📥 Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Full history for trend analysis
    
    - name: 🐍 Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: ☕ Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: 🔧 Install Quality Tools
      run: |
        # Python quality tools
        pip install bandit safety vulture radon mypy black isort flake8 pylint autopep8 pyyaml
        
        # JavaScript quality tools
        npm install -g jshint eslint complexity-report
        
        # Download Kotlin tools
        mkdir -p tools
        curl -sSLO https://github.com/pinterest/ktlint/releases/download/0.50.0/ktlint
        chmod +x ktlint
        mv ktlint tools/
        
        # Install Detekt
        curl -sSL https://github.com/detekt/detekt/releases/download/v1.23.1/detekt-cli-1.23.1.zip -o detekt.zip
        unzip -q detekt.zip
        mv detekt-cli-*/bin/detekt tools/ || true
        rm -rf detekt.zip detekt-cli-* || true
        
        echo "✅ Quality tools installed successfully"
    
    - name: 🏗️ Cache Quality Data
      uses: actions/cache@v3
      with:
        path: |
          quality_reports/
          quality_metrics.db
          ~/.cache/pip
        key: quality-cache-${{ runner.os }}-${{ hashFiles('**/quality_standards.yml') }}
        restore-keys: |
          quality-cache-${{ runner.os }}-
    
    - name: 🔍 Run Comprehensive Quality Analysis
      id: analysis
      run: |
        # Make scripts executable
        chmod +x advanced_quality_system.sh
        chmod +x enterprise_quality_enforcer.py
        
        echo "🚀 Starting enterprise quality analysis..."
        
        # Run the comprehensive analysis
        if python3 enterprise_quality_enforcer.py --all; then
          echo "✅ Quality analysis completed successfully"
          QUALITY_GATE="PASSED"
        else
          echo "⚠️ Quality analysis completed with issues"
          QUALITY_GATE="FAILED"
        fi
        
        # Extract metrics if available
        if [ -f "quality_reports/quality_dashboard.json" ]; then
          QUALITY_SCORE=$(jq -r '.overall_score // 0' quality_reports/quality_dashboard.json)
          SECURITY_SCORE=$(jq -r '.metrics.security.score // 0' quality_reports/quality_dashboard.json)
          COVERAGE_SCORE=$(jq -r '.metrics.coverage.score // 0' quality_reports/quality_dashboard.json)
        else
          QUALITY_SCORE=0
          SECURITY_SCORE=0
          COVERAGE_SCORE=0
        fi
        
        echo "quality-score=$QUALITY_SCORE" >> $GITHUB_OUTPUT
        echo "quality-gate=$QUALITY_GATE" >> $GITHUB_OUTPUT
        echo "security-score=$SECURITY_SCORE" >> $GITHUB_OUTPUT
        echo "coverage-score=$COVERAGE_SCORE" >> $GITHUB_OUTPUT
        
        echo "📊 Quality Score: $QUALITY_SCORE/100"
        echo "🛡️ Security Score: $SECURITY_SCORE/100"
        echo "🧪 Coverage Score: $COVERAGE_SCORE/100"
        echo "🚪 Quality Gate: $QUALITY_GATE"
    
    - name: 🔧 Automatic Quality Fixes
      if: github.event.inputs.auto_fix == 'true' || github.event_name == 'schedule'
      run: |
        echo "🔧 Attempting automatic quality fixes..."
        
        # Run automatic fixes
        python3 enterprise_quality_enforcer.py --fix
        
        # Check if any files were modified
        if [ -n "$(git status --porcelain)" ]; then
          echo "📝 Files were automatically fixed"
          
          # Configure git
          git config user.name "Quality Bot"
          git config user.email "quality-bot@github-actions"
          
          # Commit the fixes
          git add .
          git commit -m "🔧 auto-fix: Apply automatic quality improvements
          
          - Auto-formatted code style violations
          - Fixed import ordering and formatting
          - Applied consistent indentation
          
          Quality improvements applied by Enterprise Quality System"
          
          # Push if this is not a PR from a fork
          if [ "${{ github.event_name }}" != "pull_request" ] || [ "${{ github.event.pull_request.head.repo.full_name }}" == "${{ github.repository }}" ]; then
            git push
            echo "✅ Quality fixes committed and pushed"
          else
            echo "ℹ️ Quality fixes prepared but not pushed (external PR)"
          fi
        else
          echo "ℹ️ No automatic fixes were needed"
        fi
    
    - name: 📊 Upload Quality Reports
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: quality-reports-${{ github.run_number }}
        path: |
          quality_reports/
          quality_metrics.db
        retention-days: 30
    
    - name: 📈 Quality Trend Analysis
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        echo "📈 Analyzing quality trends..."
        
        # Generate trend report
        python3 -c "
        import json
        from pathlib import Path
        from datetime import datetime
        
        if Path('quality_reports/quality_dashboard.json').exists():
            with open('quality_reports/quality_dashboard.json') as f:
                data = json.load(f)
            
            trend_summary = {
                'date': datetime.now().isoformat(),
                'quality_score': data.get('overall_score', 0),
                'commit': '${{ github.sha }}',
                'branch': '${{ github.ref_name }}'
            }
            
            # Save trend data
            Path('quality_reports').mkdir(exist_ok=True)
            with open('quality_reports/trend_data.json', 'w') as f:
                json.dump(trend_summary, f, indent=2)
            
            print(f'📊 Trend data saved: {trend_summary}')
        "

  security-scan:
    name: 🛡️ Security Vulnerability Scan
    runs-on: ubuntu-latest
    needs: quality-analysis
    if: needs.quality-analysis.outputs.security-score < '90'
    
    steps:
    - name: 📥 Checkout Code
      uses: actions/checkout@v4
    
    - name: 🔍 Advanced Security Scan
      run: |
        echo "🔍 Running advanced security analysis..."
        
        # Install additional security tools
        pip install semgrep
        
        # Run comprehensive security scan
        semgrep --config=auto --json --output=security_scan.json . || true
        
        # Analyze results
        if [ -f "security_scan.json" ]; then
          FINDINGS=$(jq length security_scan.json)
          echo "🔍 Security findings: $FINDINGS"
          
          if [ "$FINDINGS" -gt 0 ]; then
            echo "⚠️ Security vulnerabilities detected!"
            jq -r '.[] | "- \(.check_id): \(.message) (\(.path):\(.start.line))"' security_scan.json
          fi
        fi
    
    - name: 📤 Upload Security Report
      uses: actions/upload-artifact@v3
      with:
        name: security-scan-${{ github.run_number }}
        path: security_scan.json

  quality-gate-enforcement:
    name: 🚪 Quality Gate Enforcement
    runs-on: ubuntu-latest
    needs: quality-analysis
    if: always()
    
    steps:
    - name: 📥 Checkout Code
      uses: actions/checkout@v4
    
    - name: 🏆 Quality Gate Decision
      run: |
        QUALITY_SCORE="${{ needs.quality-analysis.outputs.quality-score }}"
        QUALITY_GATE="${{ needs.quality-analysis.outputs.quality-gate }}"
        SECURITY_SCORE="${{ needs.quality-analysis.outputs.security-score }}"
        
        echo "📊 Final Quality Assessment:"
        echo "  Overall Score: $QUALITY_SCORE/100 (required: $QUALITY_THRESHOLD)"
        echo "  Security Score: $SECURITY_SCORE/100 (required: $SECURITY_THRESHOLD)"
        echo "  Quality Gate: $QUALITY_GATE"
        
        # Determine if we should block
        SHOULD_BLOCK=false
        
        if [ "$QUALITY_SCORE" -lt "$QUALITY_THRESHOLD" ]; then
          echo "❌ Quality score below threshold ($QUALITY_SCORE < $QUALITY_THRESHOLD)"
          SHOULD_BLOCK=true
        fi
        
        if [ "$SECURITY_SCORE" -lt "$SECURITY_THRESHOLD" ]; then
          echo "❌ Security score below threshold ($SECURITY_SCORE < $SECURITY_THRESHOLD)"
          SHOULD_BLOCK=true
        fi
        
        if [ "$SHOULD_BLOCK" = true ]; then
          echo ""
          echo "🚫 QUALITY GATE BLOCKED"
          echo "This code does not meet the required quality standards."
          echo "Please address the issues above before merging."
          echo ""
          echo "💡 To see detailed recommendations:"
          echo "  1. Download the quality reports artifact"
          echo "  2. Open enterprise_quality_report.html"
          echo "  3. Follow the improvement recommendations"
          exit 1
        else
          echo ""
          echo "✅ QUALITY GATE PASSED"
          echo "Code meets all quality standards - ready for deployment!"
        fi

  notification:
    name: 📧 Quality Notifications
    runs-on: ubuntu-latest
    needs: [quality-analysis, quality-gate-enforcement]
    if: always() && (github.event_name == 'push' || github.event_name == 'schedule')
    
    steps:
    - name: 📧 Send Quality Report
      if: needs.quality-analysis.outputs.quality-gate == 'FAILED'
      run: |
        echo "📧 Sending quality degradation notification..."
        
        # In a real environment, this would send notifications via:
        # - Slack webhook
        # - Email
        # - Teams webhook
        # - Custom notification system
        
        echo "Quality Alert:"
        echo "- Repository: ${{ github.repository }}"
        echo "- Branch: ${{ github.ref_name }}"
        echo "- Quality Score: ${{ needs.quality-analysis.outputs.quality-score }}/100"
        echo "- Status: QUALITY GATE FAILED"
        echo "- View Report: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"