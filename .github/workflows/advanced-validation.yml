name: Advanced Validation Suite

on:
  push:
    branches: [ main, develop, 'copilot/**' ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run weekly security scans
    - cron: '0 2 * * 1'

jobs:
  advanced-testing:
    name: Advanced Testing Suite
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Cache Gradle packages
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
          
    - name: Make scripts executable
      run: |
        chmod +x ./dev.sh
        chmod +x ./tools/*.sh
        
    - name: Run advanced testing suite
      run: ./dev.sh test-suite
      
    - name: Upload test reports
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: test-reports
        path: |
          **/build/reports/tests/
          **/build/test-results/
          reports/testing/
        retention-days: 30

  security-analysis:
    name: Security Analysis
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup security scanning tools
      run: |
        # Install OWASP dependency check
        wget -O dependency-check.zip https://github.com/jeremylong/DependencyCheck/releases/download/v8.4.3/dependency-check-8.4.3-release.zip
        unzip dependency-check.zip
        sudo ln -s $(pwd)/dependency-check/bin/dependency-check.sh /usr/local/bin/dependency-check
        
    - name: Make scripts executable
      run: |
        chmod +x ./dev.sh
        chmod +x ./tools/*.sh
        
    - name: Run security analysis
      run: ./dev.sh security
      
    - name: Upload security reports
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: security-reports
        path: reports/security/
        retention-days: 90

  documentation-generation:
    name: Documentation Generation
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Make scripts executable
      run: |
        chmod +x ./dev.sh
        chmod +x ./tools/*.sh
        
    - name: Generate documentation
      run: ./dev.sh docs
      
    - name: Upload documentation
      uses: actions/upload-artifact@v3
      with:
        name: documentation
        path: |
          docs/
          CHANGELOG.md
        retention-days: 30
        
    - name: Deploy to GitHub Pages
      if: github.ref == 'refs/heads/main'
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./docs

  performance-analysis:
    name: Performance Analysis
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Cache Gradle packages
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
          
    - name: Make scripts executable
      run: |
        chmod +x ./dev.sh
        chmod +x ./tools/*.sh
        
    - name: Run performance analysis
      run: ./dev.sh analyze
      
    - name: Upload performance reports
      uses: actions/upload-artifact@v3
      with:
        name: performance-reports
        path: reports/performance/
        retention-days: 30

  quality-monitoring:
    name: Quality Monitoring
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup quality tools
      run: |
        # Install ktlint
        curl -sSLO https://github.com/pinterest/ktlint/releases/download/0.50.0/ktlint && chmod a+x ktlint && sudo mv ktlint /usr/local/bin/
        
        # Install additional linting tools
        pip install flake8 black isort yamllint
        
    - name: Make scripts executable
      run: |
        chmod +x ./dev.sh
        chmod +x ./tools/*.sh
        
    - name: Run quality monitoring
      run: |
        # Run quality checks (non-interactive mode)
        timeout 60s ./tools/quality-monitor.sh || true
        
    - name: Generate quality report
      run: |
        mkdir -p reports/quality
        ./dev.sh validate > reports/quality/validation-report.txt 2>&1 || true
        
    - name: Upload quality reports
      uses: actions/upload-artifact@v3
      with:
        name: quality-reports
        path: reports/quality/
        retention-days: 30

  comprehensive-validation:
    name: Comprehensive Validation
    runs-on: ubuntu-latest
    needs: [advanced-testing, security-analysis, performance-analysis, quality-monitoring]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Download all artifacts
      uses: actions/download-artifact@v3
      with:
        path: validation-results
        
    - name: Generate comprehensive report
      run: |
        mkdir -p reports/comprehensive
        
        cat > reports/comprehensive/validation-summary.md << EOF
        # IRCamera Comprehensive Validation Report
        
        Generated: $(date '+%Y-%m-%d %H:%M:%S')
        Commit: ${{ github.sha }}
        Branch: ${{ github.ref_name }}
        
        ## Validation Status
        
        ### Advanced Testing Suite
        - Status: ${{ needs.advanced-testing.result }}
        - Reports: Available in artifacts
        
        ### Security Analysis
        - Status: ${{ needs.security-analysis.result }}
        - Reports: Available in artifacts
        
        ### Performance Analysis  
        - Status: ${{ needs.performance-analysis.result }}
        - Reports: Available in artifacts
        
        ### Quality Monitoring
        - Status: ${{ needs.quality-monitoring.result }}
        - Reports: Available in artifacts
        
        ## Overall Status
        
        ${{ (needs.advanced-testing.result == 'success' && needs.security-analysis.result == 'success' && needs.performance-analysis.result == 'success' && needs.quality-monitoring.result == 'success') && '✅ All validations passed' || '❌ Some validations failed - review individual reports' }}
        
        ## Recommendations
        
        1. Review detailed reports in each category
        2. Address any security vulnerabilities identified
        3. Optimize performance bottlenecks if found
        4. Improve test coverage where needed
        5. Follow up on quality metrics and code standards
        
        EOF
        
    - name: Upload comprehensive report
      uses: actions/upload-artifact@v3
      with:
        name: comprehensive-validation-report
        path: reports/comprehensive/
        retention-days: 90