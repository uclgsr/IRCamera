name: Comprehensive Quality Analysis with Enterprise Reporting

on:
  push:
    branches: [main, develop, master]
  pull_request:
    branches: [main, develop, master]
  workflow_dispatch:
    inputs:
      enable_security_scan:
        description: "Enable security vulnerability scanning"
        required: false
        default: "true"
        type: boolean
      enable_complexity_analysis:
        description: "Enable code complexity analysis"
        required: false
        default: "true"
        type: boolean
      enable_incremental:
        description: "Enable incremental processing (only changed files)"
        required: false
        default: "false"
        type: boolean
      auto_commit:
        description: "Auto-commit quality improvements"
        required: false
        default: "true"
        type: boolean

jobs:
  comprehensive-analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    
    outputs:
      quality-score: ${{ steps.analysis.outputs.quality-score }}
      total-improvement: ${{ steps.analysis.outputs.total-improvement }}
      compilation-status: ${{ steps.analysis.outputs.compilation-status }}
      report-url: ${{ steps.upload-report.outputs.report-url }}
      
    steps:
      - name: Checkout code with full history
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          
      - name: Set up comprehensive development environment
        run: |
          echo "🔧 Setting up comprehensive development environment..."
          
          # Set up JDK for Android/Java development
          sudo apt-get update
          sudo apt-get install -y openjdk-17-jdk
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
          
          # Set up Android SDK
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip -q commandlinetools-linux-9477386_latest.zip
          mkdir -p $HOME/android-sdk/cmdline-tools
          mv cmdline-tools $HOME/android-sdk/cmdline-tools/latest
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$HOME/android-sdk/platform-tools" >> $GITHUB_PATH
          
          # Accept Android licenses
          yes | $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses >/dev/null 2>&1 || true
          $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" >/dev/null 2>&1 || true
          
      - name: Set up Python with advanced tools
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Set up Node.js for JavaScript/TypeScript analysis
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          
      - name: Cache comprehensive dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.cache/pip
            ~/.npm
            ~/.local
            /usr/local/bin/ktlint
            /usr/local/bin/checkstyle*
          key: ${{ runner.os }}-comprehensive-deps-${{ hashFiles('**/*.gradle*', '**/pyproject.toml', '**/package*.json') }}
          restore-keys: |
            ${{ runner.os }}-comprehensive-deps-
            
      - name: Install comprehensive analysis toolchain
        run: |
          echo "🚀 Installing comprehensive analysis toolchain..."
          
          # Install system utilities
          sudo apt-get install -y jq xmllint bc parallel curl wget
          
          # Install Kotlin linting (ktlint latest version)
          echo "Installing ktlint..."
          curl -sSLO https://github.com/pinterest/ktlint/releases/download/1.0.1/ktlint
          chmod a+x ktlint
          sudo mv ktlint /usr/local/bin/
          
          # Install Java analysis tools (Checkstyle)
          echo "Installing Checkstyle..."
          wget -q https://github.com/checkstyle/checkstyle/releases/download/checkstyle-10.12.4/checkstyle-10.12.4-all.jar -O checkstyle.jar
          sudo mv checkstyle.jar /usr/local/bin/
          cat > checkstyle_wrapper << 'EOF'
          #!/bin/bash
          java -jar /usr/local/bin/checkstyle.jar "$@"
          EOF
          chmod +x checkstyle_wrapper
          sudo mv checkstyle_wrapper /usr/local/bin/checkstyle
          
          # Install Python analysis tools
          echo "Installing Python analysis tools..."
          pip install --upgrade pip
          pip install black flake8 isort autopep8 mypy bandit safety radon complexity
          pip install semgrep || echo "Semgrep installation skipped"
          
          # Install JavaScript/TypeScript tools
          echo "Installing JavaScript/TypeScript tools..."
          npm install -g eslint @typescript-eslint/parser @typescript-eslint/eslint-plugin
          npm install -g prettier jshint eslint-plugin-security
          
          # Install additional formatting tools
          npm install -g markdownlint-cli
          pip install yamllint tomli-w toml-sort
          
          # Verify installations
          echo "Verifying tool installations..."
          ktlint --version || echo "ktlint not available"
          checkstyle --version || echo "checkstyle not available"
          black --version || echo "black not available"
          flake8 --version || echo "flake8 not available"
          eslint --version || echo "eslint not available"
          
      - name: Configure analysis environment
        run: |
          echo "⚙️ Configuring analysis environment..."
          
          # Set environment variables for analysis
          echo "ENABLE_SECURITY_SCAN=${{ github.event.inputs.enable_security_scan || 'true' }}" >> $GITHUB_ENV
          echo "ENABLE_COMPLEXITY_ANALYSIS=${{ github.event.inputs.enable_complexity_analysis || 'true' }}" >> $GITHUB_ENV
          echo "ENABLE_INCREMENTAL=${{ github.event.inputs.enable_incremental || 'false' }}" >> $GITHUB_ENV
          
          # Make scripts executable
          chmod +x gradlew || true
          chmod +x format_all_files.sh || true
          chmod +x quality_check.sh || true
          chmod +x enhanced_quality_analyzer.sh || true
          
          # Configure Git for potential commits
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action - Quality Analysis"
          
      - name: Create analysis backup branch
        run: |
          echo "📦 Creating backup branch for rollback capability..."
          backup_branch="quality-analysis-backup-$(date +%Y%m%d-%H%M%S)-${{ github.run_number }}"
          git checkout -b "$backup_branch"
          git push origin "$backup_branch" 2>/dev/null || true
          git checkout ${{ github.ref_name }}
          echo "backup_branch=$backup_branch" >> $GITHUB_ENV
          echo "✅ Backup branch created: $backup_branch"
          
      - name: Run comprehensive quality analysis
        id: analysis
        run: |
          echo "🔍 Starting comprehensive quality analysis..."
          
          # Execute enhanced quality analyzer
          ./enhanced_quality_analyzer.sh 2>&1 | tee analysis_output.log
          
          # Extract key metrics from JSON report
          if [ -f "enhanced_quality_report.json" ]; then
            total_improvement=$(jq -r '.summary.total_improvement' enhanced_quality_report.json)
            compilation_status=$(jq -r '.compilation.status' enhanced_quality_report.json)
            total_files=$(jq -r '.performance.total_files' enhanced_quality_report.json)
            processing_time=$(jq -r '.performance.processing_time' enhanced_quality_report.json)
            
            # Calculate quality score (0-100 based on improvements and compilation status)
            quality_score=50
            if [ "$compilation_status" = "success" ]; then
              quality_score=$((quality_score + 30))
            fi
            if [ "$total_improvement" -gt 0 ]; then
              improvement_bonus=$((total_improvement > 20 ? 20 : total_improvement))
              quality_score=$((quality_score + improvement_bonus))
            fi
            
            echo "total-improvement=$total_improvement" >> $GITHUB_OUTPUT
            echo "compilation-status=$compilation_status" >> $GITHUB_OUTPUT
            echo "quality-score=$quality_score" >> $GITHUB_OUTPUT
            echo "total-files=$total_files" >> $GITHUB_OUTPUT
            echo "processing-time=$processing_time" >> $GITHUB_OUTPUT
            
            echo "📊 Analysis Results Summary:"
            echo "  Quality Score: $quality_score/100"
            echo "  Total Improvements: $total_improvement"
            echo "  Compilation Status: $compilation_status"
            echo "  Files Processed: $total_files"
            echo "  Processing Time: ${processing_time}s"
          else
            echo "❌ Quality report not generated - analysis may have failed"
            exit 1
          fi
          
      - name: Generate enhanced documentation
        run: |
          echo "📚 Generating enhanced documentation..."
          
          # Create comprehensive README update
          cat >> QUALITY_ANALYSIS_RESULTS.md << EOF
          # 🔍 Comprehensive Quality Analysis Results
          
          **Analysis Date:** $(date)
          **Workflow Run:** #${{ github.run_number }}
          **Branch:** ${{ github.ref_name }}
          
          ## 📊 Quality Metrics
          
          | Metric | Value |
          |--------|-------|
          | Overall Quality Score | ${{ steps.analysis.outputs.quality-score }}/100 |
          | Total Improvements | ${{ steps.analysis.outputs.total-improvement }} |
          | Compilation Status | ${{ steps.analysis.outputs.compilation-status }} |
          | Files Processed | ${{ steps.analysis.outputs.total-files }} |
          | Processing Time | ${{ steps.analysis.outputs.processing-time }}s |
          
          ## 🛠️ Analysis Tools Used
          
          - **Kotlin**: ktlint 1.0.1 with auto-fixing
          - **Java**: Checkstyle 10.12.4 with Google style guide
          - **Python**: Black, flake8, isort, bandit (security), radon (complexity)
          - **JavaScript/TypeScript**: ESLint with security plugins
          - **Security Scanning**: $([ "${{ env.ENABLE_SECURITY_SCAN }}" = "true" ] && echo "Enabled" || echo "Disabled")
          - **Complexity Analysis**: $([ "${{ env.ENABLE_COMPLEXITY_ANALYSIS }}" = "true" ] && echo "Enabled" || echo "Disabled")
          
          ## 📈 Detailed Results
          
          For detailed analysis results, see the generated HTML report in the workflow artifacts.
          
          ---
          *Generated by Comprehensive Quality Analysis workflow*
          EOF
          
      - name: Upload comprehensive reports
        id: upload-report
        uses: actions/upload-artifact@v3
        with:
          name: comprehensive-quality-analysis-${{ github.run_number }}
          path: |
            enhanced_quality_report.html
            enhanced_quality_report.json
            analysis_output.log
            QUALITY_ANALYSIS_RESULTS.md
          retention-days: 30
          
      - name: Handle compilation failures with intelligent rollback
        if: steps.analysis.outputs.compilation-status == 'failure'
        run: |
          echo "💥 Compilation failed - performing intelligent rollback..."
          
          # Detailed failure analysis
          echo "🔍 Analyzing compilation failures..."
          
          # Reset to backup branch
          git reset --hard "origin/${{ env.backup_branch }}"
          
          # Create failure report
          cat >> COMPILATION_FAILURE_REPORT.md << EOF
          # ❌ Compilation Failure Report
          
          **Analysis Date:** $(date)
          **Workflow Run:** #${{ github.run_number }}
          **Branch:** ${{ github.ref_name }}
          
          ## 🚨 Failure Details
          
          The comprehensive quality analysis detected compilation failures after formatting.
          Changes have been automatically rolled back to preserve code integrity.
          
          ## 🔄 Rollback Actions Taken
          
          - Restored code to backup branch: \`${{ env.backup_branch }}\`
          - Preserved original functionality
          - Generated failure report for investigation
          
          ## 📋 Next Steps
          
          1. Review formatting rules for potential conflicts
          2. Test formatting changes in smaller batches
          3. Check tool configurations for compatibility issues
          
          ---
          *Generated by Comprehensive Quality Analysis workflow*
          EOF
          
          echo "🔄 Rollback completed - code integrity preserved"
          exit 1
          
      - name: Auto-commit quality improvements
        if: github.event.inputs.auto_commit == 'true' && steps.analysis.outputs.compilation-status == 'success'
        run: |
          echo "💾 Auto-committing quality improvements..."
          
          # Check for changes
          if [ -n "$(git status --porcelain 2>/dev/null)" ]; then
            # Add all changes
            git add .
            
            # Create detailed commit message
            commit_msg="feat: Comprehensive quality improvements with enterprise analysis
            
            📊 Quality Analysis Results:
            ├── Overall Quality Score: ${{ steps.analysis.outputs.quality-score }}/100
            ├── Total Violations Fixed: ${{ steps.analysis.outputs.total-improvement }}
            ├── Files Processed: ${{ steps.analysis.outputs.total-files }}
            ├── Processing Time: ${{ steps.analysis.outputs.processing-time }}s
            └── Compilation Status: ${{ steps.analysis.outputs.compilation-status }}
            
            🔧 Enterprise Features Applied:
            ├── Advanced Kotlin linting with ktlint 1.0.1
            ├── Java style enforcement with Checkstyle
            ├── Python code quality with Black/flake8/isort
            ├── Security vulnerability scanning: ${{ env.ENABLE_SECURITY_SCAN }}
            ├── Code complexity analysis: ${{ env.ENABLE_COMPLEXITY_ANALYSIS }}
            └── Compilation validation with rollback protection
            
            🚀 Technical Achievements:
            ├── Multi-language code quality enforcement
            ├── Performance optimization with parallel processing
            ├── Enterprise-grade error handling and rollback
            ├── Comprehensive HTML and JSON reporting
            └── CI/CD integration with quality gates
            
            Co-authored-by: Enhanced Quality Analyzer <quality@github-actions>"
            
            git commit -m "$commit_msg"
            git push
            
            echo "✅ Quality improvements committed successfully"
          else
            echo "✨ No changes needed - code quality is already optimal!"
          fi
          
      - name: Cleanup analysis artifacts
        if: always()
        run: |
          echo "🧹 Cleaning up analysis artifacts..."
          
          # Clean up backup branch if analysis was successful
          if [ "${{ steps.analysis.outputs.compilation-status }}" = "success" ]; then
            git push origin --delete "${{ env.backup_branch }}" 2>/dev/null || true
            echo "✅ Backup branch cleaned up"
          else
            echo "🔒 Backup branch preserved due to failures"
          fi
          
          # Clean up temporary files
          rm -f analysis_output.log *.tmp quality_backup_* || true
          
      - name: Comment on PR with comprehensive results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            
            // Read analysis results
            let qualityScore = '${{ steps.analysis.outputs.quality-score }}';
            let totalImprovement = '${{ steps.analysis.outputs.total-improvement }}';
            let compilationStatus = '${{ steps.analysis.outputs.compilation-status }}';
            let totalFiles = '${{ steps.analysis.outputs.total-files }}';
            let processingTime = '${{ steps.analysis.outputs.processing-time }}';
            
            // Determine status emoji and color
            let statusEmoji = compilationStatus === 'success' ? '✅' : '❌';
            let qualityEmoji = qualityScore >= 80 ? '🌟' : qualityScore >= 60 ? '👍' : '⚠️';
            
            const report = `## 🔍 Comprehensive Quality Analysis Results
            
            ${statusEmoji} **Overall Status:** ${compilationStatus.toUpperCase()}
            ${qualityEmoji} **Quality Score:** ${qualityScore}/100
            
            ### 📊 Analysis Summary
            
            | Metric | Value |
            |--------|-------|
            | 🎯 Quality Score | ${qualityScore}/100 |
            | 🔧 Violations Fixed | ${totalImprovement} |
            | 📁 Files Processed | ${totalFiles} |
            | ⚡ Processing Time | ${processingTime}s |
            | 🏗️ Compilation | ${statusEmoji} ${compilationStatus} |
            
            ### 🛠️ Enterprise Analysis Features
            
            - **Multi-Language Support**: Kotlin, Java, Python, JavaScript/TypeScript
            - **Security Scanning**: ${{ env.ENABLE_SECURITY_SCAN === 'true' ? 'Enabled' : 'Disabled' }}
            - **Complexity Analysis**: ${{ env.ENABLE_COMPLEXITY_ANALYSIS === 'true' ? 'Enabled' : 'Disabled' }}
            - **Rollback Protection**: Automatic compilation validation
            - **Performance Optimization**: Parallel processing with batching
            
            ### 📈 Quality Improvements
            
            ${totalImprovement > 0 ? `🎉 **${totalImprovement} code quality violations were automatically fixed!**` : '✨ **Code quality is already optimal - no violations found.**'}
            
            ### 📋 Next Steps
            
            ${compilationStatus === 'success' ? 
              '- ✅ All quality checks passed - ready for merge\n- 📊 Review detailed HTML report in workflow artifacts\n- 🔄 Quality improvements have been automatically applied' :
              '- ❌ Compilation issues detected - changes rolled back\n- 🔍 Review failure report in workflow artifacts\n- 🛠️ Fix compilation issues before proceeding'
            }
            
            ---
            📄 **Detailed Reports:** Available in workflow artifacts
            🔗 **Workflow Run:** [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: report
            });
            
      - name: Set quality gate status
        run: |
          echo "🎯 Setting quality gate status..."
          
          if [ "${{ steps.analysis.outputs.compilation-status }}" = "success" ] && [ "${{ steps.analysis.outputs.quality-score }}" -ge 60 ]; then
            echo "✅ Quality gate: PASSED"
            echo "quality-gate-status=passed" >> $GITHUB_ENV
          else
            echo "❌ Quality gate: FAILED"
            echo "quality-gate-status=failed" >> $GITHUB_ENV
            exit 1
          fi