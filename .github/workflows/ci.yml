name: CI - Build and Code Quality

on:
  push:
    branches: [ main, develop, 'copilot/**' ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-validate:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
    
    - name: Grant execute permission
      run: |
        chmod +x gradlew
        chmod +x dev.sh
    
    - name: Install linting tools
      run: |
        # Install Python tools for linting
        pip install black flake8 yamllint
        
        # Install shellcheck and XML tools
        sudo apt-get update
        sudo apt-get install -y shellcheck xmllint
        
        # Install ktlint for Kotlin
        curl -sSLO https://github.com/pinterest/ktlint/releases/download/1.0.1/ktlint && \
        chmod a+x ktlint && \
        sudo mv ktlint /usr/local/bin/
    
    - name: Run code formatting check
      run: ./dev.sh format
    
    - name: Run linting (ktlint, checkstyle, etc.)
      run: ./dev.sh lint
    
    - name: Run static analysis
      run: ./dev.sh static
    
    - name: Quick build validation
      run: ./dev.sh build-check
    
    - name: Full gradle build
      run: |
        timeout 600 ./gradlew build -x test --no-daemon --parallel
      env:
        GRADLE_OPTS: -Xmx4g -XX:MaxMetaspaceSize=1g
    
    - name: Run unit tests
      run: ./gradlew testDebugUnitTest --continue
      continue-on-error: true
    
    - name: Generate build report
      if: always()
      run: |
        echo "## Build Summary" > build-summary.md
        echo "- **Gradle Version**: $(./gradlew --version | grep Gradle | head -1)" >> build-summary.md
        echo "- **Java Version**: $(java -version 2>&1 | head -1)" >> build-summary.md
        echo "- **Kotlin Files**: $(find . -name "*.kt" -not -path "./build/*" | wc -l)" >> build-summary.md
        echo "- **Java Files**: $(find . -name "*.java" -not -path "./build/*" | wc -l)" >> build-summary.md
        echo "- **Build Status**: ${{ job.status }}" >> build-summary.md
    
    - name: Upload lint reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: lint-reports
        path: |
          **/build/reports/lint-results*.html
          **/build/reports/lint-results*.xml
        retention-days: 7
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: build-logs
        path: |
          **/build/reports/
          **/build/outputs/logs/
          build-summary.md
        retention-days: 7
    
    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: |
          **/build/test-results/
          **/build/reports/tests/
        retention-days: 7