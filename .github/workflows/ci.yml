name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
    
    - name: Grant execute permission
      run: |
        chmod +x gradlew
        chmod +x dev.sh
    
    - name: Install development tools
      run: |
        # Install Python tools for linting
        pip install black flake8 yamllint
        
        # Install shellcheck
        sudo apt-get update
        sudo apt-get install -y shellcheck xmllint
    
    - name: Run code formatting
      run: ./dev.sh format
    
    - name: Run linting
      run: ./dev.sh lint
    
    - name: Build project
      run: timeout 600 ./dev.sh build
    
    - name: Run tests
      run: ./dev.sh test
      continue-on-error: true
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: build-logs
        path: |
          **/build/reports/
          **/build/outputs/logs/
    
    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: |
          **/build/test-results/
          **/build/reports/tests/