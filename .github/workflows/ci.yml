name: CI - Build and Code Quality

on:
  push:
    branches: [ main, develop, 'copilot/**' ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-validate:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Lint with ktlint
        run: ./gradlew ktlintCheck || true

      - name: Lint with checkstyle
        run: ./gradlew checkstyle || true

      - name: Build with Gradle
        run: ./gradlew build

      - name: Run tests
        run: ./gradlew test

  static-analysis:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install Python tools
        run: |
          pip install black flake8

      - name: Python style check
        run: |
          find . -name "*.py" -exec black --check {} + || true
          find . -name "*.py" -exec flake8 {} + || true

      - name: Shell script check
        run: |
          find . -name "*.sh" -exec shellcheck {} + || true

  architecture-diagram:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v5

      - name: Generate architecture diagram
        run: ./dev.sh diagram

      - name: Upload diagram artifacts
        uses: actions/upload-artifact@v4
        with:
          name: architecture-diagrams
          path: |
            docs/architecture-diagram.md
            docs/architecture-viewer.html
