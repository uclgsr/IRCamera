name: GitHub Copilot Workflow

on:
  push:
    branches: [ "dev", "main" ]
  pull_request:
    branches: [ "dev", "main" ]
  workflow_dispatch:

jobs:
  copilot-setup:
    runs-on: ubuntu-latest
    name: Copilot Configuration Check
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate Copilot Instructions
        run: |
          echo "Checking Copilot instructions..."
          if [ -f ".github/copilot-instructions.md" ]; then
            echo "✅ Copilot instructions found"
            echo "Instructions file size: $(wc -l < .github/copilot-instructions.md) lines"
          else
            echo "❌ Copilot instructions missing"
            exit 1
          fi

      - name: Check Project Structure
        run: |
          echo "Validating project structure for Copilot..."
          echo "📁 Repository structure:"
          find . -maxdepth 2 -type d | head -20
          
          echo ""
          echo "📄 Key configuration files:"
          ls -la | grep -E "\.(md|yml|yaml|json|properties|gradle)$" || true

      - name: Validate Build Scripts
        run: |
          echo "Checking build and development scripts..."
          if [ -f "dev.sh" ]; then
            echo "✅ dev.sh found"
            chmod +x dev.sh
            ./dev.sh help || echo "dev.sh help command available"
          fi
          
          if [ -f "gradlew" ]; then
            echo "✅ Gradle wrapper found"
            chmod +x gradlew
          fi

      - name: Check PC Controller Setup
        run: |
          echo "Validating PC Controller structure..."
          if [ -d "pc-controller" ]; then
            echo "✅ PC Controller directory found"
            ls -la pc-controller/ | head -10
            
            if [ -f "pc-controller/requirements.txt" ] || [ -f "pc-controller/setup.py" ]; then
              echo "✅ Python dependencies configuration found"
            fi
          fi

      - name: Summary
        run: |
          echo ""
          echo "🤖 GitHub Copilot Setup Summary:"
          echo "================================"
          echo "✅ Copilot instructions configured"
          echo "✅ Project structure validated"
          echo "✅ Build system detected"
          echo "✅ Multi-language support (Kotlin/Java, Python)"
          echo "✅ Development tools available"
          echo ""
          echo "GitHub Copilot is ready to assist with:"
          echo "- Android app development (Kotlin/Java)"
          echo "- PC controller development (Python)"
          echo "- Build system management (Gradle)"
          echo "- Documentation and testing"