# Advanced Quality Standards Configuration
# Defines enterprise-grade quality requirements and thresholds

quality_gates:
  overall_minimum: 85
  security_minimum: 90
  complexity_maximum: 15
  duplication_maximum: 5
  coverage_minimum: 70
  style_minimum: 95

security_analysis:
  enabled: true
  tools:
    - bandit  # Python security linter
    - safety  # Dependency vulnerability scanner
  patterns:
    exclude_paths:
      - "*/build/*"
      - "*/test/*"
      - "*/migration_backup_*/*"
    critical_patterns:
      - "password.*=.*['\"]"
      - "api_key.*=.*['\"]"
      - "secret.*=.*['\"]"
      - "token.*=.*['\"]"
    sql_injection_patterns:
      - "rawQuery"
      - "execSQL"
      - "query.*\\+"

complexity_analysis:
  enabled: true
  thresholds:
    cyclomatic_complexity: 10
    cognitive_complexity: 15
    max_lines_per_method: 50
    max_parameters: 5
  languages:
    java:
      enabled: true
      exclude_patterns:
        - "*/com/github/mikephil/*"  # Third-party library
        - "*/com/github/gzuliyujiang/*"  # Third-party library
    kotlin:
      enabled: true
      tools:
        - ktlint
        - detekt
    python:
      enabled: true
      tools:
        - radon
        - mccabe

code_style:
  kotlin:
    rules:
      max_line_length: 120
      indent_size: 4
      trailing_comma: true
      import_ordering: true
  java:
    rules:
      max_line_length: 120
      indent_size: 4
      checkstyle_config: "checkstyle.xml"
  python:
    rules:
      max_line_length: 88
      use_black: true
      use_isort: true
      flake8_config: "setup.cfg"

test_coverage:
  enabled: true
  targets:
    unit_tests: 80
    integration_tests: 60
  exclude_paths:
    - "*/build/*"
    - "*/generated/*"
    - "*/test/*"

duplication_detection:
  enabled: true
  minimum_tokens: 50
  languages:
    - java
    - kotlin
    - python
  exclude_paths:
    - "*/build/*"
    - "*/generated/*"

performance_analysis:
  enabled: true
  thresholds:
    build_time_max: 300  # seconds
    analysis_time_max: 120  # seconds
  profiling:
    memory_usage: true
    cpu_usage: true

reporting:
  formats:
    - json
    - html
    - markdown
  dashboard:
    enabled: true
    auto_refresh: true
  notifications:
    quality_gate_failure: true
    significant_degradation: true

continuous_improvement:
  trend_analysis: true
  historical_data_retention: 30  # days
  quality_score_targets:
    current_sprint: 85
    next_sprint: 88
    long_term: 92

third_party_exclusions:
  # Exclude third-party libraries from quality analysis
  paths:
    - "libui/src/main/java/com/github/mikephil/"
    - "libui/src/main/java/com/github/gzuliyujiang/"
    - "*/node_modules/*"
    - "*/vendor/*"
  patterns:
    - "*.min.js"
    - "*.bundle.js"
    - "*-generated.java"